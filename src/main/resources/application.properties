# 应用名称
spring.application.name=Decoration-Order-Management-System

# 服务器端口
server.port=8080

# ============================================
# 数据库配置
# ============================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/decoration_order_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# ============================================
# MyBatis-Plus 配置
# ============================================
# Mapper XML 文件位置
mybatis-plus.mapper-locations=classpath*:mapper/**/*.xml
# 实体类包路径
mybatis-plus.type-aliases-package=com.gzu.decoration.entity
# 开启驼峰命名转换
mybatis-plus.configuration.map-underscore-to-camel-case=true
# 打印 SQL 日志（开发环境）
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
# 全局配置
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# ============================================
# JWT 配置
# ============================================
# JWT 密钥（生产环境建议使用更复杂的密钥，并通过环境变量配置）
jwt.secret=decoration-order-management-system-secret-key-2024-very-long-string
# Token 过期时间（毫秒），默认7天 = 604800000ms
jwt.expiration=604800000

# ============================================
# 日志配置
# ============================================
logging.level.root=INFO
logging.level.com.gzu.decoration=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n
